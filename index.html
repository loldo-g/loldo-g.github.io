<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nao sei</title>
    <style>

            text-align: center;

        h1 {

        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;

        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        a {
            color: #2575fc;
            text-decoration: none;
        }
        
        a:hover {

        }

</head>

</html>
